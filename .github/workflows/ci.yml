---
name: "CI"

on:
  push:

# Disable all default permissions
permissions: {}

jobs:
  go:
    runs-on: ubuntu-24.04

    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - run: go mod download -x

      - run: go mod tidy -diff

      - name: Unit tests
        run: go test -v ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11.4 # renovate: datasource=github-releases depName=golangci/golangci-lint
          skip-cache: true

      - name: Docker build
        run: docker compose build backend
        working-directory: ./deployments/local

      - name: Deploy local test cluster
        run: docker compose up --detach --wait
        working-directory: ./deployments/local

      - name: Run integration tests
        run: go test -v ./tests/e2e/...
        env:
          TEST_WTF_GO_BACKEND_ENDPOINT: http://localhost:8081

      - name: Generate docker image artifact
        run: docker save --output wtf-go-backend.tar wtf-go-backend:latest

      - name: Upload docker image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: wtf-go-backend.tar
          name: docker-backend
          if-no-files-found: error

  documentation:
    runs-on: ubuntu-24.04

    permissions:
      contents: read # to checkout the source code

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build the book
        run: docker run --rm --volume "$(pwd):/wtf-go" --workdir /wtf-go/docs ne02ptzero/romero:latest build

      - name: Generate GitHub Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: ./docs/book

  deploy:
    runs-on: ubuntu-24.04
    if: ${{ startsWith(github.ref, 'refs/tags/') }}

    permissions:
      id-token: write # to verify the deployment originates from an appropriate source
      pages: write # to deploy to Pages

    environment:
      name: production

    needs:
      - documentation
      - go

    steps:
      - name: Download docker backend image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docker-backend

      - name: Load docker backend image
        run: docker load --input wtf-go-backend.tar

      - name: Deploy documentation to GitHub Pages
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

      - name: Login to Scaleway Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          registry: ${{ vars.DOCKER_REPOSITORY }}

      - name: Tag and push docker backend image
        run: |
          docker tag wtf-go-backend:latest "${{ vars.DOCKER_REPOSITORY }}/backend:${{ github.sha }}"
          docker push "${{ vars.DOCKER_REPOSITORY }}/backend:${{ github.sha }}"
