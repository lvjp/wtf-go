---
name: wtf-go

services:
  backend:
    build:
      context: ../..
      dockerfile: ./build/Dockerfile
    restart: unless-stopped
    ports:
      - 8081:8080
    healthcheck:
      test: ["CMD", "wtf-go", "healthcheck"]
    volumes:
      - ./config.yaml:/etc/wtf-go/config.yaml:ro
  swagger:
    image: swaggerapi/swagger-ui:v5.32.0@sha256:641afb45f0f14167da03659c220eff40c5aab231337ed2bad494802737d4e2ae
    restart: always
    environment:
      - SWAGGER_JSON=/opt/swagger.yaml
      - VALIDATOR_URL=none
    volumes:
      - ../../api/openapi.yaml:/opt/swagger.yaml
    ports:
      - 8082:8080
    healthcheck:
      test: wget -S --spider http://127.0.0.1:8080 -U local-healthcheck
  prometheus:
    image: prom/prometheus:v3.9.1@sha256:1f0f50f06acaceb0f5670d2c8a658a599affe7b0d8e78b898c1035653849a702
    restart: unless-stopped
    ports:
      - 9090:9090
    volumes:
      - ./prometheus:/etc/prometheus:ro
    command: --web.enable-lifecycle --config.file=/etc/prometheus/prometheus.yml
    healthcheck:
      test: wget -S --spider http://localhost:9090/-/healthy
  grafana:
    image: grafana/grafana:12.3@sha256:a604f143dbb145a16cd58d22b1451826ee59fcf9de561dc6d698b1de222272d0
    restart: unless-stopped
    environment:
      GF_SECURITY_DISABLE_INITIAL_ADMIN_CREATION: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_SIGNOUT_MENU: "true"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    depends_on:
      prometheus:
        condition: service_healthy
    ports:
      - 9091:3000
    volumes:
      - ./grafana:/etc/grafana/provisioning:ro
    healthcheck:
      test: curl --fail -q -s http://localhost:3000/api/health
