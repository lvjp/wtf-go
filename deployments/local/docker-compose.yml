---
name: wtf-go

services:
  backend:
    build:
      context: ../..
      dockerfile: ./build/Dockerfile
    restart: unless-stopped
    ports:
      - 8081:8080
    healthcheck:
      test: ["CMD", "wtf-go", "healthcheck"]
    volumes:
      - ./config.yaml:/etc/wtf-go/config.yaml:ro
  swagger:
    image: swaggerapi/swagger-ui:v5.32.5@sha256:e78799b4bae355666efe09f10ff8e119f8367ad2c5715aed7d0367f68acd2c14
    restart: always
    environment:
      - SWAGGER_JSON=/opt/swagger.yaml
      - VALIDATOR_URL=none
    volumes:
      - ../../api/openapi.yaml:/opt/swagger.yaml
    ports:
      - 8082:8080
    healthcheck:
      test: wget -S --spider http://127.0.0.1:8080 -U local-healthcheck
