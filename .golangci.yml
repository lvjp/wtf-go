version: "2"
linters:
  enable:
    - asciicheck
    - bodyclose
    - dupl
    - errname
    - goconst
    - gocritic
    - gocyclo
    - gosec
    - importas
    - misspell
    - noctx
    - mnd
    - nestif
    - nilerr
    - nilnil
    - revive
    - testifylint
    - unconvert
    - whitespace
    - zerologlint
  settings:
    errcheck:
      # Report about not checking of errors in type assertions: `a := b.(MyStruct)`.
      check-type-assertions: true
      # report about assignment of errors to blank identifier: `num, _ := strconv.Atoi(numStr)`;
      check-blank: true
    gosec:
      excludes:
        - G704 # Broken: https://github.com/securego/gosec/pull/1522
        - G705 # Broken: https://github.com/securego/gosec/pull/1522
    gocyclo:
      # minimal code complexity to report, 30 by default
      min-complexity: 15
    govet:
      enable:
        # Check for redundant or impossible nil comparisons.
        - nilness
        # Check for possible unintended shadowing of variables.
        - shadow
    revive:
      rules:
        - name: package-comments
          disabled: true
  exclusions:
    generated: strict
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
formatters:
  enable:
    - gci
    - gofmt
  settings:
    gci:
      sections:
        - standard
        - localmodule
        - default
      custom-order: true
  exclusions:
    generated: strict
